name: "Ensure Terraform State Container"
description: "Creates the Azure Storage container for Terraform state if it does not already exist"

inputs:
  storage_account_name:
    description: "Name of the Azure Storage account"
    required: true
  container_name:
    description: "Name of the blob container to ensure exists"
    required: true
  azure_client_id:
    description: "Azure client ID for OIDC login"
    required: true
  azure_tenant_id:
    description: "Azure tenant ID for OIDC login"
    required: true
  azure_subscription_id:
    description: "Azure subscription ID for OIDC login"
    required: true

runs:
  using: composite
  steps:
    - name: "Azure Login"
      uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
      with:
        client-id: ${{ inputs.azure_client_id }}
        tenant-id: ${{ inputs.azure_tenant_id }}
        subscription-id: ${{ inputs.azure_subscription_id }}

    - name: "Ensure Container Exists"
      shell: bash
      env:
        CONTAINER_NAME: ${{ inputs.container_name }}
        STORAGE_ACCOUNT_NAME: ${{ inputs.storage_account_name }}
      run: |
        az storage container create \
          --name "$CONTAINER_NAME" \
          --account-name "$STORAGE_ACCOUNT_NAME" \
          --auth-mode login \
          --output none \
          2>&1 | grep -v "already exists" || true
        echo "Container '$CONTAINER_NAME' is ready."
