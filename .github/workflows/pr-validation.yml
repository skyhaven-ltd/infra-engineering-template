name: PR Validation

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  Validate:
    uses: skyhaven-ltd/pipeline-engineering-github-actions/.github/workflows/reusable-terraform.yml@6cfa143b42ff464e4101d69c09945db9fac369e5 # v2.0.0
    with:
      environments: '["dev","prd"]'
      # Azure identity comes from the AZURE_* GitHub environment variables;
      # plan-time secrets are declared per line below and fetched from the
      # platform Key Vault after OIDC login.
      # tf_var_secrets: |
      #   TF_VAR_example=example-kv-secret-name
