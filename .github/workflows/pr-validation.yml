name: PR Validation

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  Validate:
    uses: skyhaven-ltd/pipeline-engineering-github-actions/.github/workflows/reusable-terraform.yml@f5851503b5a5f3f08b349bca15a9324eae238ed1 # v1.0.0
    with:
      environments: '["dev","prd"]'
    # inherit is required: the AZURE_* values are environment secrets, which an
    # explicit secrets: mapping cannot see (it is evaluated outside any
    # environment scope). zizmor's secrets-inherit finding is suppressed for
    # this file in .github/validation/zizmor.yml.
    secrets: inherit
