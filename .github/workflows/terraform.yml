name: "Terraform"

on:
  push:
    branches:
      - main
      - "major/**"
      - "minor/**"
      - "patch/**"
    paths:
      - "infra/**"
  workflow_dispatch:
    inputs:
      env:
        description: "Environment"
        type: choice
        default: dev
        options:
          - dev
          - prd
      terraform_action:
        description: "Terraform Action"
        type: choice
        default: plan
        options:
          - plan
          - apply
          - destroy

permissions:
  contents: read
  id-token: write

# Serialise runs so a merge-triggered apply never races another apply or a
# feature-branch plan for the same state.
concurrency:
  group: terraform-${{ github.repository }}
  cancel-in-progress: false

jobs:
  # Pushes to main (merged PRs) apply to prd automatically; other pushes
  # plan; workflow_dispatch overrides both.
  Terraform:
    name: "Terraform ${{ inputs.terraform_action || (github.ref == 'refs/heads/main' && 'apply' || 'plan') }} (${{ inputs.env || (github.ref == 'refs/heads/main' && 'prd' || 'dev') }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.env || (github.ref == 'refs/heads/main' && 'prd' || 'dev') }}
    env:
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_USE_OIDC: "true"
      TF_ACTION: ${{ inputs.terraform_action || (github.ref == 'refs/heads/main' && 'apply' || 'plan') }}
      TF_ENV: ${{ inputs.env || (github.ref == 'refs/heads/main' && 'prd' || 'dev') }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.14.8"

      - name: "Azure Login"
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_PLATFORM_SUBSCRIPTION_ID }}

      - name: "Ensure State Container"
        uses: skyhaven-ltd/pipeline-engineering-github-actions/actions/ensure-tfstate-container@6cfa143b42ff464e4101d69c09945db9fac369e5 # v2.0.0
        with:
          storage_account_name: stplatform${{ env.TF_ENV }}uks02
          container_name: ${{ github.event.repository.name }}
          login: "false"

      - name: "Terraform Init"
        uses: skyhaven-ltd/pipeline-engineering-github-actions/actions/terraform-backend-init@6cfa143b42ff464e4101d69c09945db9fac369e5 # v2.0.0
        with:
          environment: ${{ env.TF_ENV }}
          working_directory: infra
          platform_subscription_id: ${{ vars.AZURE_PLATFORM_SUBSCRIPTION_ID }}
          container_name: ${{ github.event.repository.name }}

      - name: "Terraform Plan"
        if: env.TF_ACTION == 'plan'
        run: |
          terraform -chdir=infra plan \
            -var-file="vars/globals.tfvars" \
            -var-file="vars/${TF_ENV}.tfvars"

      - name: "Terraform Apply"
        if: env.TF_ACTION == 'apply'
        run: |
          terraform -chdir=infra apply -auto-approve \
            -var-file="vars/globals.tfvars" \
            -var-file="vars/${TF_ENV}.tfvars"

      - name: "Terraform Destroy"
        if: env.TF_ACTION == 'destroy'
        run: |
          terraform -chdir=infra destroy -auto-approve \
            -var-file="vars/globals.tfvars" \
            -var-file="vars/${TF_ENV}.tfvars"

      - name: "Break State Lease"
        if: always()
        uses: skyhaven-ltd/pipeline-engineering-github-actions/actions/break-tfstate-lease@6cfa143b42ff464e4101d69c09945db9fac369e5 # v2.0.0
        with:
          storage_account_name: stplatform${{ env.TF_ENV }}uks02
          container_name: ${{ github.event.repository.name }}
          login: "false"
